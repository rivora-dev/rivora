display_information:
  name: Rivora Self-Hosted
  description: Self-hosted Rivora team memory adapter.
  background_color: "#1f2937"
features:
  bot_user:
    display_name: rivora
    always_online: false
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - chat:write
settings:
  event_subscriptions:
    bot_events:
      - app_mention
  interactivity:
    is_enabled: false
  socket_mode_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
