# cargo-deny configuration for Open Rivora.
# Scope is intentionally narrow for the foundation: advisories + licenses.
# bans/sources are deferred to a later phase to avoid CI flakiness.

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "workspace"
yanked = "deny"

[licenses]
# Allow common permissive licenses used by the foundation dependencies.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "0BSD",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8

exceptions = [
    { name = "webpki-roots", allow = ["MPL-2.0", "(MPL-2.0 OR Apache-2.0)", "Apache-2.0"] }
]
